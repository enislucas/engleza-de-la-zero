<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Previzualizare teme</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/themes.css">
</head>
<body>
<div id="app"></div>
<script type="module">
// Harnașament de previzualizare: profil demo + temă din ?t= — NU salvează nimic.
import { state, newProfile, todayStr } from './js/state.js';
import { applyPrefs } from './js/state.js';
import { nav } from './js/ui.js';
import { initSpeech } from './js/speech.js';

const q = new URLSearchParams(location.search);
const theme = q.get('t') || 'vesel';
const screen = q.get('s') || 'home';

// profil demo bogat (ca ecranul să arate viu)
const p = newProfile('Maria', '👩');
p.theme = theme; p.fontScale = 1.15; p.why = 'familie';
p.game.gems = 240; p.game.xp = 385; p.game.hearts = 4;
p.game.streak = { count: 7, lastDay: todayStr(), freezes: 1, travel: false };
p.game.league = { tier: 1, weekId: '', xpWeek: 96, history: [] };
p.game.stats = { days: { [todayStr()]: 30 }, lessons: 21, perfect: 8, wordsLearned: 0 };
// progres: primele lecții din unitatea 1 făcute
p.game.units = { u01: { done: 3, test: false } };
state.data = { v: 1, profiles: [p], active: p.id, installed: todayStr() };
state.profile = p;
// dezactivăm salvarea (previzualizare pură)
try { localStorage.removeItem('ezr_v1'); } catch (_) {}

initSpeech();
applyPrefs();
nav(screen);
setTimeout(() => { document.title = 'PREVIEW-READY'; }, 1200);
</script>
</body>
</html>
